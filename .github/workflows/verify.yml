name: Verify
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run typecheck
      - run: npm run verify:runtime-levels
      - run: npm run verify:levels
      - run: npm test
      - run: npm run quality
      - run: npm run build:vercel
