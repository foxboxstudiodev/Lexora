name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Verify runtime level progression
        run: npm run verify:runtime-levels

      - name: Verify level API regression tests
        run: npx vitest run src/features/levels/levels.test.ts

      - name: Verify preview build
        run: npm run build:vercel
