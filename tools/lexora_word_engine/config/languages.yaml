# Lexora Word Engine — Language Configuration
# ===========================================
#
# Single source of truth for Lexora's professional multilingual word-base engine.
# Runtime target:
#   - active languages: 14
#   - target levels per language: 1000
#   - global minimum wheel letters: 4

engine:
  name: lexora_word_engine
  version: 1.1.0
  master_db_name: lexora_words_master.sqlite
  default_target_level_count: 1000
  default_min_wheel_letters: 4
  default_review_status: pending
  default_gameplay_approved: false

source_priority:
  - kaikki_wiktionary
  - wiktionary_dump
  - hunspell_dictionary
  - open_frequency_corpus
  - manual_curated
  - manual_blacklist

quality_policy:
  require_source_attribution: true
  require_language_specific_normalizer: true
  require_language_specific_alphabet_validator: true
  require_duplicate_merge: true
  require_rejected_words_export: true
  require_review_queue_export: true
  require_build_report: true
  block_by_default:
    proper_names: true
    offensive_words: true
    abbreviations: true
    phrases: true
    words_with_spaces: true
    words_with_digits: true
    words_with_punctuation: true
    mixed_script_words: true
  allowed_pos_global:
    - noun
    - verb
    - adjective
    - adverb
  output_formats:
    - sqlite_master
    - csv_master
    - txt_game_words
    - json_unity_export
    - rejected_csv
    - review_queue_csv
    - build_report_json

languages:
  en:
    english_name: English
    native_name: English
    script: latin
    active: true
    target_level_count: 1000
    min_wheel_letters: 4
    supports_accents: false
    case_policy: uppercase_game_display_lowercase_storage
    min_word_length: 3
    max_word_length: 10
    alphabet: "abcdefghijklmnopqrstuvwxyz"
    allowed_extra_chars: ""
    normalize:
      lowercase: true
      strip_accents: false
      preserve_diacritics: false
      custom_i_policy: none
    sources:
      kaikki_wiktionary:
        enabled: true
        dictionary_slug: English
      hunspell:
        enabled: true
        dictionary_hint: en_US/en_GB
      frequency_corpus:
        enabled: true
        required_for_gameplay_score: true
    gameplay:
      prefer_common_words: true
      compound_policy: conservative
      min_gameplay_score: 60
      review_rare_words: true

